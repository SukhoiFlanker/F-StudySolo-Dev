server {
    listen 80;
    server_name studyflow.1037solo.com;

    # Force HTTPS redirect
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name studyflow.1037solo.com;

    # Let's Encrypt SSL (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/studyflow.1037solo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/studyflow.1037solo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security response headers
    add_header Content-Security-Policy   "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'" always;
    add_header X-Frame-Options           "DENY"                 always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Static assets — 365-day immutable cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:2037;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Backend API (including SSE)
    location /api/ {
        proxy_pass         http://127.0.0.1:2038;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE support
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     300s;
        proxy_connect_timeout  10s;
        proxy_set_header       Connection "";
        chunked_transfer_encoding on;
    }

    # Frontend (Next.js SSR)
    location / {
        proxy_pass         http://127.0.0.1:2037;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
