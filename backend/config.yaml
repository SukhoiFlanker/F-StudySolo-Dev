# StudySolo AI 运行时配置中心
# 说明：
# 1. YAML 只负责运行时路由策略，不再承担模型目录与价格中心职责。
# 2. 模型目录、价格、可见性、tier gating 统一由 Supabase ai_model_families / ai_model_skus 维护。
# 3. $ENV_A|ENV_B 表示兼容旧环境变量别名，config_loader.py 会按顺序解析。

providers:
  dashscope:
    display_name: "阿里云百炼"
    role: "native"
    base_url: "$DASHSCOPE_BASE_URL"
    api_key: "$DASHSCOPE_API_KEY"

  deepseek:
    display_name: "DeepSeek 官方"
    role: "native"
    base_url: "$DEEPSEEK_BASE_URL"
    api_key: "$DEEPSEEK_API_KEY"

  moonshot:
    display_name: "月之暗面"
    role: "native"
    base_url: "$MOONSHOT_BASE_URL"
    api_key: "$MOONSHOT_API_KEY"

  volcengine:
    display_name: "火山引擎"
    role: "native"
    base_url: "$VOLCENGINE_BASE_URL"
    api_key: "$VOLCENGINE_API_KEY"

  zhipu:
    display_name: "智谱 AI"
    role: "native"
    base_url: "$ZHIPU_BASE_URL"
    api_key: "$ZHIPU_API_KEY"

  qiniu:
    display_name: "七牛云"
    role: "proxy"
    base_url: "$QINIU_BASE_URL"
    api_key: "$QINIU_AI_API_KEY|QINIU_API_KEY"

  siliconflow:
    display_name: "硅基流动"
    role: "proxy"
    base_url: "$SILICONFLOW_BASE_URL"
    api_key: "$SILICONFLOW_API_KEY"

  compshare:
    display_name: "优云智算"
    role: "proxy"
    base_url: "$COMPSHARE_BASE_URL|YOUYUN_BASE_URL"
    api_key: "$COMPSHARE_API_KEY|YOUYUN_API_KEY"

task_routes:
  trigger_input:
    routing_policy: "native_first"
    sku_ids:
      - "sku_dashscope_qwen_turbo_native"
      - "sku_deepseek_chat_native"
      - "sku_volcengine_doubao_pro_32k_native"

  ai_analyzer:
    routing_policy: "native_first"
    sku_ids:
      - "sku_dashscope_qwen_turbo_native"
      - "sku_deepseek_chat_native"
      - "sku_volcengine_doubao_pro_32k_native"

  ai_planner:
    routing_policy: "native_first"
    sku_ids:
      - "sku_dashscope_qwen_turbo_native"
      - "sku_deepseek_chat_native"
      - "sku_volcengine_doubao_pro_32k_native"

  flashcard:
    routing_policy: "native_first"
    sku_ids:
      - "sku_dashscope_qwen_turbo_native"
      - "sku_deepseek_chat_native"
      - "sku_volcengine_doubao_pro_32k_native"

  quiz_gen:
    routing_policy: "native_first"
    sku_ids:
      - "sku_dashscope_qwen_turbo_native"
      - "sku_deepseek_chat_native"
      - "sku_volcengine_doubao_pro_32k_native"

  logic_switch:
    routing_policy: "native_first"
    sku_ids:
      - "sku_dashscope_qwen_turbo_native"
      - "sku_deepseek_chat_native"

  outline_gen:
    routing_policy: "native_first"
    sku_ids:
      - "sku_deepseek_reasoner_native"
      - "sku_dashscope_qwen_plus_native"
      - "sku_volcengine_doubao_pro_256k_native"

  content_extract:
    routing_policy: "native_first"
    sku_ids:
      - "sku_deepseek_reasoner_native"
      - "sku_dashscope_qwen_plus_native"
      - "sku_volcengine_doubao_pro_256k_native"

  summary:
    routing_policy: "native_first"
    sku_ids:
      - "sku_deepseek_reasoner_native"
      - "sku_dashscope_qwen_plus_native"
      - "sku_volcengine_doubao_pro_256k_native"

  merge_polish:
    routing_policy: "proxy_first"
    sku_ids:
      - "sku_qiniu_kimi_k2_5_proxy"
      - "sku_moonshot_v1_128k_native"

  compare:
    routing_policy: "native_first"
    sku_ids:
      - "sku_deepseek_reasoner_native"
      - "sku_dashscope_qwen_plus_native"

  chat_response:
    routing_policy: "native_first"
    sku_ids:
      - "sku_deepseek_reasoner_native"
      - "sku_dashscope_qwen_plus_native"
      - "sku_volcengine_doubao_pro_256k_native"

  premium_chat:
    routing_policy: "proxy_first"
    sku_ids:
      - "sku_qiniu_qwen3_max_proxy"
      - "sku_siliconflow_qwen_72b_proxy"
      - "sku_dashscope_qwen_max_native"

  search:
    routing_policy: "capability_fixed"
    sku_ids:
      - "sku_qiniu_search_primary"
      - "sku_zhipu_search_expansion"

  ocr:
    routing_policy: "capability_fixed"
    sku_ids:
      - "sku_zhipu_glm_ocr_native"

compatibility:
  provider_aliases:
    youyun: "compshare"

engine:
  timeout_ms: 30000
  max_retries: 3
  max_nodes_per_workflow: 12
  json_validation_retries: 3

# ============================================================
# AI 对话面板精选模型路由（轨道 A）
# 设计原则：
#   - sku_ids 数组即降级链：index 0 = 首选，index 1 = 降级
#   - 只有 1 个 sku_id = 无降级，挂了直接报错
#   - is_recommended = true 则前端渲染 ⭐ 推荐图标
#   - required_tier 决定前端置灰 + 后端拦截
# ============================================================
chat_models:
  - key: "deepseek_r1"
    display_name: "DeepSeek R1"
    vendor: "deepseek"
    required_tier: "free"
    sort_order: 1
    is_recommended: false
    sku_ids:
      - "sku_deepseek_reasoner_native"

  - key: "qwen35_flash"
    display_name: "Qwen3.5-Flash"
    vendor: "qwen"
    required_tier: "free"
    sort_order: 2
    is_recommended: false
    sku_ids:
      - "sku_dashscope_qwen35_flash_native"

  - key: "qwen3_max"
    display_name: "Qwen3-Max"
    vendor: "qwen"
    required_tier: "pro"
    sort_order: 3
    is_recommended: false
    sku_ids:
      - "sku_qiniu_qwen3_max_proxy"          # 首选：七牛云代理
      - "sku_dashscope_qwen_max_native"       # 降级：百炼官网

  - key: "glm45"
    display_name: "GLM-4.5"
    vendor: "zhipu"
    required_tier: "free"
    sort_order: 4
    is_recommended: false
    sku_ids:
      - "sku_zhipu_glm_45_native"

  - key: "glm47"
    display_name: "GLM-4.7"
    vendor: "zhipu"
    required_tier: "pro"
    sort_order: 5
    is_recommended: true                      # ⭐ 推荐图标
    sku_ids:
      - "sku_zhipu_glm_47_native"

  - key: "doubao_seed"
    display_name: "DouBao-Seed2.0"
    vendor: "doubao"
    required_tier: "pro"
    sort_order: 6
    is_recommended: false
    sku_ids:
      - "sku_qiniu_doubao_seed_lite_proxy"    # 首选：七牛云代理
      - "sku_volcengine_doubao_seed_native"   # 降级：火山引擎官网

  - key: "kimi_k2"
    display_name: "Kimi-K2"
    vendor: "moonshot"
    required_tier: "pro"
    sort_order: 7
    is_recommended: false
    sku_ids:
      - "sku_moonshot_kimi_k2_native"

  - key: "gpt_oss_120b"
    display_name: "GPT-OSS-120B"
    vendor: "openai_oss"
    required_tier: "pro"
    sort_order: 8
    is_recommended: false
    sku_ids:
      - "sku_qiniu_gpt_oss_120b_proxy"

